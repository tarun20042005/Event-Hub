kind = "web"
previewPath = "/"
title = "Event Management & Ticketing Platform"
version = "1.0.0"
id = "artifacts/event-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19579

[services.development]
run = "pnpm --filter @workspace/event-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-platform", "run", "build" ]
publicDir = "artifacts/event-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19579"
BASE_PATH = "/"
